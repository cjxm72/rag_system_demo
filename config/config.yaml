models:
  embedding:
    name: "local:all-MiniLM-L6-v2"  # 本地嵌入模型路径或名称
    provider: "local"
    model_path: "./models/all-MiniLM-L6-v2"    # 本地模型路径

  llm:
    name: "local:Qwen2.5-1.5B-Instruct-GGUF"              # 本地LLM名称
    provider: "local"
    model_path: "./models/Qwen2.5-1.5B-Instruct-GGUF"     # 本地模型路径

# FAISS向量库配置
vector_store:
  index_path: "./data/faiss_index"  # 索引保存路径
  similarity_top_k: 5               # 检索返回数量

# 检索配置
retrieval:
  hybrid_ratio: 0.7                # 混合检索权重（0-1）
  rerank_model: "local:bge-reranker-base" # 重排序模型
  model_path: "./models/bge-reranker-base"  # 本地模型路径

# 系统提示词
prompts:
  system: "你是一个专业的企业数据管理秘书，请根据提供的企业文档回答问题。如果不知道答案，请明确表示。"
  retrieval: "请从以下企业文档中提取相关信息回答问题：\n{context}\n\n问题：{question}"