# 仅作默认/后备，实际以前端 LocalStorage 传入为准
# 仅支持：硅基流动（测试/生产） + Ollama（本地兼容，改 URL 即可）

vector_store:
  similarity_top_k: 5
  rerank_top_n: 5

retrieval:
  hybrid_ratio: 0.7

prompts:
  system: "你是一个专业的企业数据管理秘书，请根据提供的文档内容回答问题。若文档中无相关内容，请明确说明。"
  retrieval: "根据以下文档内容回答问题：\n{context}\n\n问题：{question}"

# 硅基流动默认 base（Ollama 由前端传 base_url）
siliconflow:
  api_base: "https://api.siliconflow.cn/v1"
