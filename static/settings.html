<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 · 企业数据管理秘书</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; max-width: 560px; margin: 0 auto; padding: 24px; background: #f5f6f8; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    .hint { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
    label { display: block; margin: 12px 0 4px; font-weight: 500; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    input[type="password"] { font-family: monospace; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: #2563eb; color: #fff; margin-top: 16px; }
    button:hover { background: #1d4ed8; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
    a { color: #2563eb; }
    .ok { color: #059669; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>设置</h1>
  <p class="hint">配置保存在浏览器 LocalStorage，仅本机使用。仅支持硅基流动 + Ollama（本地可改 URL）。</p>

  <label>硅基流动 API Key</label>
  <input type="password" id="api_key" placeholder="sk-xxx" autocomplete="off" />

  <label>API Base（硅基）</label>
  <input type="text" id="api_base" placeholder="https://api.siliconflow.cn/v1" />

  <label>Embedding 模型（硅基）</label>
  <input type="text" id="embedding_model" placeholder="Qwen/Qwen3-Embedding-0.6B" />

  <label>Reranker 模型（硅基）</label>
  <input type="text" id="reranker_model" placeholder="Qwen/Qwen3-Reranker-0.6B" />

  <label>回答用 LLM 提供商</label>
  <select id="llm_provider">
    <option value="siliconflow">硅基流动</option>
    <option value="ollama">Ollama（本地/自建）</option>
  </select>

  <label>回答用 LLM 模型名</label>
  <input type="text" id="llm_model" placeholder="Pro/deepseek-ai/DeepSeek-V3.2" />

  <label>Ollama Base URL（仅当提供商选 Ollama 时有效）</label>
  <input type="text" id="ollama_base_url" placeholder="http://localhost:11434/v1" />

  <label>视觉/OCR 模型（解析图片与 PDF 内图片）</label>
  <input type="text" id="vision_model" placeholder="Qwen/Qwen2-VL-7B-Instruct" />

  <label>Temperature</label>
  <input type="number" id="temperature" min="0" max="1" step="0.1" value="0.7" />

  <label>Max Tokens</label>
  <input type="number" id="max_tokens" min="100" value="2000" />

  <div class="row">
    <button id="save">保存到 LocalStorage</button>
    <a href="/">返回主页</a>
  </div>
  <p id="msg" class="ok"></p>

  <script>
    const KEY = "rag_settings";
    const fields = [
      "api_key", "api_base", "embedding_model", "reranker_model",
      "llm_provider", "llm_model", "ollama_base_url", "vision_model",
      "temperature", "max_tokens"
    ];
    function load() {
      try {
        const s = JSON.parse(localStorage.getItem(KEY) || "{}");
        fields.forEach(f => {
          const el = document.getElementById(f);
          if (el && s[f] !== undefined) el.value = s[f];
        });
      } catch (_) {}
    }
    function save() {
      const s = {};
      fields.forEach(f => {
        const el = document.getElementById(f);
        if (el) s[f] = el.type === "number" ? parseFloat(el.value) : el.value;
      });
      localStorage.setItem(KEY, JSON.stringify(s));
      document.getElementById("msg").textContent = "已保存到 LocalStorage";
    }
    document.getElementById("save").onclick = save;
    load();
  </script>
</body>
</html>
